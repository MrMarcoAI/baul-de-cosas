<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Libertadores — Gestor del Torneo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#282828;
  --border:#2E2E2E;--gold:#C9A84C;--gold2:#EDD06A;--gold3:#8B6914;
  --text:#F0F0F0;--text2:#999999;--text3:#555555;
  --green:#1E8A4C;--red:#B02828;
}
body{background:var(--bg);color:var(--text);font-family:'Ubuntu','Segoe UI',system-ui,sans-serif;min-height:100vh;}

/* HEADER */
header{background:linear-gradient(180deg,#111111 0%,#0D0D0D 100%);border-bottom:2px solid var(--gold);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:70px;}
header img{height:52px;filter:drop-shadow(0 2px 12px rgba(201,168,76,.5));flex-shrink:0;}
#main-nav{display:flex;align-items:stretch;height:100%;}
.tab{padding:0 22px;cursor:pointer;font-size:0.82rem;font-weight:700;color:var(--text2);border:none;background:none;border-bottom:3px solid transparent;text-transform:uppercase;letter-spacing:1.5px;height:100%;display:flex;align-items:center;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.hamburger{display:none;background:none;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;cursor:pointer;font-size:1.1rem;}
@media(max-width:600px){
  header{padding:0 16px;}
  #main-nav{display:none;position:fixed;top:70px;left:0;right:0;background:#111111;border-bottom:2px solid var(--gold);flex-direction:column;height:auto;z-index:98;}
  #main-nav.open{display:flex;}
  .tab{padding:14px 20px;border-bottom:1px solid var(--border);border-left:3px solid transparent;justify-content:flex-start;height:auto;}
  .tab.active{border-left-color:var(--gold);border-bottom-color:var(--border);}
  .hamburger{display:block;}
}

/* SECTIONS */
.section{display:none;padding:20px 28px;}
.section.active{display:block;}

/* GROUP TABS */
.gnav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.gtab{padding:7px 16px;background:var(--bg3);border:1px solid transparent;border-radius:4px;cursor:pointer;font-size:0.78rem;font-weight:700;color:var(--text2);letter-spacing:1px;}
.gtab:hover{border-color:var(--gold);color:var(--text);}
.gtab.active{background:var(--gold);color:#0D0D0D;border-color:var(--gold);}
.gview{display:none;}
.gview.active{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
@media(max-width:860px){.gview.active{grid-template-columns:1fr;}}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.card-head{background:var(--bg3);padding:10px 16px;border-bottom:1px solid var(--gold);display:flex;align-items:center;justify-content:space-between;}
.card-head h3{font-size:0.75rem;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}

/* STANDINGS TABLE */
.std-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.std-table thead th{background:var(--bg3);color:var(--text2);font-size:0.68rem;letter-spacing:1px;text-transform:uppercase;padding:7px 5px;text-align:center;font-weight:600;}
.std-table thead th:first-child{text-align:left;padding-left:12px;}
.std-table tbody td{padding:8px 5px;border-bottom:1px solid var(--border);text-align:center;color:var(--text2);}
.std-table tbody td:first-child{text-align:left;padding-left:12px;color:var(--text);}
.std-table tbody tr:last-child td{border-bottom:none;}
.std-table tbody tr:hover td{background:rgba(201,168,76,.04);}
.qualified{background:rgba(201,168,76,.08)!important;}
.qualified td:first-child{border-left:3px solid var(--gold);padding-left:9px!important;}
.pts-cell{font-weight:700;color:var(--text);}
.pos-num{color:var(--text3);font-size:0.7rem;margin-right:5px;}

/* CALENDAR */
.jornada-label{font-size:0.65rem;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:3px 12px;background:rgba(10,10,10,.95);border-bottom:1px solid var(--border);}
.match-row{display:flex;align-items:center;padding:5px 10px;border-bottom:1px solid var(--border);gap:6px;}
.match-row:last-child{border-bottom:none;}

.mteam{flex:1;min-width:0;font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mteam.home{text-align:right;}
.mteam.away{text-align:left;}
.sbox{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.sinput{width:58px;height:34px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);text-align:center;font-size:1rem;font-weight:700;outline:none;}
.sinput::-webkit-inner-spin-button,.sinput::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.sinput{-moz-appearance:textfield;}
.sinput:focus{border-color:var(--gold);}
.sinput.filled{border-color:var(--border);}
.sdash{color:var(--text3);font-weight:700;font-size:.85rem;}

/* KNOCKOUT BRACKET */
.khead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.khead h2{font-size:0.95rem;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.qualified-list{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:22px;}
.qualified-list h3{font-size:0.75rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.q-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:700px){.q-grid{grid-template-columns:repeat(2,1fr);}}
.q-item{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:0.78rem;display:flex;align-items:center;gap:6px;}
.q-pos{font-size:0.65rem;font-weight:700;background:var(--gold);color:#0D0D0D;border-radius:2px;padding:1px 5px;}

/* R16 SETUP */
.r16-setup{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:22px;}
.r16-setup h3{font-size:0.75rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.r16-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:700px){.r16-grid{grid-template-columns:1fr;}}
.r16-row{display:flex;align-items:center;gap:8px;background:var(--bg3);padding:8px 12px;border-radius:5px;border:1px solid var(--border);}
.r16-num{font-size:0.7rem;font-weight:700;color:var(--gold);width:20px;flex-shrink:0;}
.r16-sel{flex:1;background:var(--bg4);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:5px 8px;font-size:0.78rem;outline:none;cursor:pointer;}
.r16-sel:focus{border-color:var(--gold);}
option{background:#1F1F1F;}
.r16-vs{color:var(--text3);font-size:0.72rem;font-weight:700;flex-shrink:0;}

/* BRACKET */
.bracket-scroll{overflow-x:auto;padding-bottom:16px;margin-top:4px;}
.bracket{display:flex;gap:10px;min-width:860px;}
.bround{flex:1;display:flex;flex-direction:column;min-height:720px;}
.bround-lbl{text-align:center;padding:8px 4px;font-size:0.68rem;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:8px;flex-shrink:0;}
.bties{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px;}

.btie{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.btie-num{background:var(--bg3);padding:3px 10px;font-size:0.65rem;color:var(--text3);letter-spacing:1px;display:flex;justify-content:space-between;}
.btie-leg{padding:6px 10px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:0.78rem;gap:6px;}
.bteam{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.78rem;}
.bteam.winner{color:var(--gold);font-weight:700;}
.bteam.loser{color:var(--text3);}
.bscore{display:flex;align-items:center;gap:3px;}
.binput{width:46px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);text-align:center;font-size:.9rem;font-weight:700;outline:none;}
.binput::-webkit-inner-spin-button,.binput::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.binput{-moz-appearance:textfield;}
.binput:focus{border-color:var(--gold);}
.btie-agg{padding:3px 10px;background:rgba(201,168,76,.05);font-size:0.68rem;color:var(--text2);display:flex;justify-content:space-between;border-top:1px solid var(--border);}
.agg-val{font-weight:700;}
.btie-pen{padding:4px 10px;display:flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--text2);border-top:1px solid var(--border);background:rgba(201,168,76,.04);}
.pinput{width:24px;height:20px;background:var(--bg3);border:1px solid var(--gold);border-radius:3px;color:var(--text);text-align:center;font-size:.78rem;outline:none;}
.leg-lbl{font-size:0.65rem;color:var(--text3);flex-shrink:0;}

/* FINAL + CHAMPION */
.bchamp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:110px;padding:10px 6px;}
.trophy{font-size:2.8rem;filter:drop-shadow(0 2px 8px rgba(201,168,76,.6));}
.champ-lbl{font-size:0.62rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.champ-name{font-size:0.85rem;font-weight:800;color:var(--gold);text-align:center;margin-top:4px;word-break:break-word;}

/* SCORERS */
.scorer-wrap{max-width:660px;}
.scorer-form{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.scorer-form input[type="text"]{flex:1;min-width:140px;}
.scorer-form input[type="text"].team-input{flex:0.7;min-width:120px;}
.team-sel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px 12px;font-size:0.85rem;outline:none;cursor:pointer;font-family:inherit;}
.scorer-form input[type="number"]{width:68px;}
input[type="text"],input[type="number"]{background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px 12px;font-size:0.85rem;outline:none;}
input[type="text"]:focus,input[type="number"]:focus{border-color:var(--gold);}
input[type="text"]::placeholder,input[type="number"]::placeholder{color:var(--text3);}
.btn{background:var(--gold);color:#0D0D0D;border:none;border-radius:4px;padding:8px 18px;font-weight:700;cursor:pointer;font-size:0.82rem;letter-spacing:1px;}
.btn:hover{background:var(--gold2);}
.btn-sm{padding:4px 10px;font-size:0.72rem;}
.btn-del{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:3px;padding:3px 8px;cursor:pointer;font-size:0.7rem;}
.btn-del:hover{background:var(--red);color:#fff;}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:6px 14px;font-size:0.75rem;font-weight:600;cursor:pointer;letter-spacing:1px;}
.btn-outline:hover{background:var(--gold);color:#0D0D0D;}
.goals-cell{display:flex;align-items:center;justify-content:center;gap:5px;}
.goals-edit{width:38px;height:26px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);text-align:center;font-size:.85rem;font-weight:700;outline:none;}
.goals-edit:focus{border-color:var(--gold);}
.medal-1{color:#FFD700;font-size:1rem;}
.medal-2{color:#C0C0C0;font-size:1rem;}
.medal-3{color:#CD7F32;font-size:1rem;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold);}

/* UTILS */
.divider{height:1px;background:var(--border);margin:18px 0;}
.info-note{font-size:0.75rem;color:var(--text3);font-style:italic;margin-bottom:12px;}
html{-webkit-text-size-adjust:100%;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* MOBILE */
@media(max-width:600px){
  .section{padding:14px 12px;}
  .gview.active{gap:14px;}
  /* pestañas de grupos: 4 por fila (2 filas de 4) */
  .gnav{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .gtab{padding:9px 2px;text-align:center;font-size:0.72rem;letter-spacing:0;}
  /* tabla de posiciones/goleadores compacta */
  .std-table{font-size:0.76rem;}
  .std-table thead th{font-size:0.6rem;padding:6px 4px;}
  .std-table tbody td{padding:6px 4px;}
  .std-table thead th:first-child,.std-table tbody td:first-child{padding-left:9px;}
  /* iOS Safari: font-size >=16px evita el zoom al enfocar.
     !important para ganar a input[type=number]/[type=text] (mayor especificidad) */
  input,select,textarea{font-size:16px !important;}
  /* alto util de inputs en movil */
  .binput{height:32px;}
  .pinput{width:30px;height:26px;}
  .goals-edit{width:46px;height:30px;}
}
</style>
</head>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const GROUPS = {
  A:['River Plate','Ind. del Valle','Junior','Carabobo'],
  B:['Nacional','Botafogo','Colo-Colo','Rosario Central'],
  C:['Palmeiras','Cerro Porteño','Barcelona','Alianza Lima'],
  D:['Racing','Fluminense','Atl. Nacional','Sp. Cristal'],
  E:['Boca Juniors','Libertad','Santos','U. de Chile'],
  F:['Flamengo','Estudiantes','Bolívar','Palestino'],
  G:['Atlético MG','Olimpia','Universitario','San Lorenzo'],
  H:['Peñarol','LDU Quito','U. Católica','Millonarios']
};

// Round-robin schedule for 4 teams (0-3)
const SCHEDULE = [
  [[0,3],[1,2]],
  [[0,2],[3,1]],
  [[0,1],[2,3]],
  [[3,0],[2,1]],
  [[2,0],[1,3]],
  [[1,0],[3,2]]
];

const GROUP_IDS = Object.keys(GROUPS);

// ── DATA MODEL ─────────────────────────────────────────────────────────────
function freshData() {
  const groups = {};
  GROUP_IDS.forEach(gid => {
    groups[gid] = [];
    SCHEDULE.forEach((round, j) => {
      round.forEach(([h, a]) => {
        groups[gid].push({j, h, a, hg:'', ag:''});
      });
    });
  });

  const mkTie = () => ({t1:'', t2:'', l1:{hg:'',ag:''}, l2:{hg:'',ag:''}, p1:'', p2:''});
  return {
    groups,
    knockout: {
      r16: Array.from({length:8}, mkTie),
      qf:  Array.from({length:4}, mkTie),
      sf:  Array.from({length:2}, mkTie),
      final: {t1:'', t2:'', hg:'', ag:'', p1:'', p2:''}
    },
    scorers: []
  };
}

let data = loadData();
function loadData() {
  try {
    const s = localStorage.getItem('lib2025');
    if (s) {
      const d = JSON.parse(s);
      // ensure structure is complete (merge with fresh defaults, sin borrar datos)
      const base = freshData();
      if (!d.groups) d.groups = base.groups;
      if (!d.knockout) d.knockout = base.knockout;
      d.knockout.final = Object.assign({}, base.knockout.final, d.knockout.final);
      if (!Array.isArray(d.scorers)) d.scorers = [];
      return d;
    }
  } catch(e){}
  return freshData();
}
function saveData() {
  localStorage.setItem('lib2025', JSON.stringify(data));
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
  if (id === 'fase-final') renderKnockout();
  if (id === 'goleadores') renderScorers();
  // close mobile menu
  document.getElementById('main-nav').classList.remove('open');
}
function toggleMenu(){
  document.getElementById('main-nav').classList.toggle('open');
}

// ── STANDINGS LOGIC ─────────────────────────────────────────────────────────
function computeStandings(gid) {
  const teams = GROUPS[gid];
  const stats = teams.map(name => ({name, mp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));
  for (const m of data.groups[gid]) {
    const hg = parseInt(m.hg), ag = parseInt(m.ag);
    if (isNaN(hg) || isNaN(ag)) continue;
    stats[m.h].mp++; stats[m.a].mp++;
    stats[m.h].gf += hg; stats[m.h].ga += ag;
    stats[m.a].gf += ag; stats[m.a].ga += hg;
    if (hg > ag)      { stats[m.h].w++; stats[m.h].pts+=3; stats[m.a].l++; }
    else if (ag > hg) { stats[m.a].w++; stats[m.a].pts+=3; stats[m.h].l++; }
    else              { stats[m.h].d++; stats[m.h].pts++; stats[m.a].d++; stats[m.a].pts++; }
  }
  stats.forEach(s => s.gd = s.gf - s.ga);
  stats.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
  return stats;
}

function getQualified() {
  const q = {winners:[], runnersUp:[]};
  GROUP_IDS.forEach(gid => {
    const s = computeStandings(gid);
    q.winners.push({team: s[0].name, group: gid, pos: 1});
    q.runnersUp.push({team: s[1].name, group: gid, pos: 2});
  });
  return q;
}

function getAllQualifiedTeams() {
  const q = getQualified();
  return [...q.winners, ...q.runnersUp].map(x => x.team);
}

// ── GROUP RENDERING ─────────────────────────────────────────────────────────
let activeGroup = 'A';

function initGroups() {
  const nav = document.getElementById('gnav');
  const views = document.getElementById('gviews');
  nav.innerHTML = GROUP_IDS.map(gid =>
    `<button class="gtab${gid==='A'?' active':''}" onclick="switchGroup('${gid}',this)">Grupo ${gid}</button>`
  ).join('');
  views.innerHTML = GROUP_IDS.map(gid =>
    `<div class="gview${gid==='A'?' active':''}" id="gview-${gid}">
      <div class="card" id="cal-${gid}"></div>
      <div class="card" id="std-${gid}"></div>
    </div>`
  ).join('');
  GROUP_IDS.forEach(gid => renderGroup(gid));
}

function switchGroup(gid, btn) {
  activeGroup = gid;
  document.querySelectorAll('.gtab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.gview').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gview-' + gid).classList.add('active');
}

function renderGroup(gid) {
  renderCalendar(gid);
  renderStandings(gid);
}

function renderCalendar(gid) {
  const cal = document.getElementById('cal-' + gid);
  const matches = data.groups[gid];
  const teams = GROUPS[gid];

  let html = `<div class="card-head"><h3>Calendario — Grupo ${gid}</h3></div>`;
  for (let j = 0; j < 6; j++) {
    html += `<div class="jornada-label">Jornada ${j+1}${j<3?' (Ida)':' (Vuelta)'}</div>`;
    matches.filter(m => m.j === j).forEach((m, _) => {
      const mi = matches.indexOf(m);
      html += `<div class="match-row">
        <span class="mteam home">${teams[m.h]}</span>
        <div class="sbox">
          <input class="sinput" type="number" min="0" max="99"
            data-gid="${gid}" data-mi="${mi}" data-side="h"
            value="${m.hg}" placeholder="—"
            oninput="onGroupScore(this)">
          <span class="sdash">-</span>
          <input class="sinput" type="number" min="0" max="99"
            data-gid="${gid}" data-mi="${mi}" data-side="a"
            value="${m.ag}" placeholder="—"
            oninput="onGroupScore(this)">
        </div>
        <span class="mteam away">${teams[m.a]}</span>
      </div>`;
    });
  }
  cal.innerHTML = html;
}

function renderStandings(gid) {
  const std = document.getElementById('std-' + gid);
  const stats = computeStandings(gid);
  let html = `<div class="card-head"><h3>Posiciones — Grupo ${gid}</h3></div>
    <div class="tbl-wrap"><table class="std-table">
    <thead><tr>
      <th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th>
      <th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
    </tr></thead><tbody>`;
  stats.forEach((s, i) => {
    const q = i < 2 ? ' class="qualified"' : '';
    html += `<tr${q}>
      <td><span class="pos-num">${i+1}</span>${s.name}</td>
      <td>${s.mp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
      <td>${s.gf}</td><td>${s.ga}</td>
      <td>${s.gd >= 0 ? '+' : ''}${s.gd}</td>
      <td class="pts-cell">${s.pts}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  std.innerHTML = html;
}

function onGroupScore(inp) {
  const {gid, mi, side} = inp.dataset;
  data.groups[gid][parseInt(mi)][side === 'h' ? 'hg' : 'ag'] = inp.value;
  saveData();
  renderStandings(gid);
}

// ── KNOCKOUT WINNER ─────────────────────────────────────────────────────────
function tieWinner(tie) {
  const l1h = parseInt(tie.l1.hg), l1a = parseInt(tie.l1.ag);
  const l2h = parseInt(tie.l2.hg), l2a = parseInt(tie.l2.ag);
  if (!tie.t1 || !tie.t2) return null;
  if (isNaN(l1h)||isNaN(l1a)||isNaN(l2h)||isNaN(l2a)) return null;
  const agg1 = l1h + l2a; // t1 total
  const agg2 = l1a + l2h; // t2 total
  if (agg1 > agg2) return tie.t1;
  if (agg2 > agg1) return tie.t2;
  const p1 = parseInt(tie.p1), p2 = parseInt(tie.p2);
  if (!isNaN(p1) && !isNaN(p2) && p1 !== p2) return p1 > p2 ? tie.t1 : tie.t2;
  return null;
}

function finalWinner(f) {
  if (!f.t1 || !f.t2) return null;
  const g1 = parseInt(f.hg), g2 = parseInt(f.ag);
  if (isNaN(g1)||isNaN(g2)) return null;
  if (g1 > g2) return f.t1;
  if (g2 > g1) return f.t2;
  const p1 = parseInt(f.p1), p2 = parseInt(f.p2);
  if (!isNaN(p1) && !isNaN(p2) && p1 !== p2) return p1 > p2 ? f.t1 : f.t2;
  return null;
}

function tieAgg(tie) {
  const l1h = parseInt(tie.l1.hg), l1a = parseInt(tie.l1.ag);
  const l2h = parseInt(tie.l2.hg), l2a = parseInt(tie.l2.ag);
  if (isNaN(l1h)||isNaN(l1a)||isNaN(l2h)||isNaN(l2a)) return null;
  return {a1: l1h + l2a, a2: l1a + l2h};
}

function needsPen(tie) {
  const a = tieAgg(tie);
  return a && a.a1 === a.a2;
}

// ── KNOCKOUT RENDERING ──────────────────────────────────────────────────────
function renderKnockout() {
  const sec = document.getElementById('knockout-section');
  // Propagate winners to next rounds automatically
  propagateWinners();

  const q = getQualified();
  const allQ = [...q.winners, ...q.runnersUp];

  let html = '';

  // R16 setup
  html += `<div class="r16-setup">
    <h3>Armar Octavos de Final</h3>
    <p class="info-note">Selecciona los equipos para cada cruce. Los ganadores avanzan automáticamente.</p>
    <div class="r16-grid">`;
  for (let i = 0; i < 8; i++) {
    const tie = data.knockout.r16[i];
    html += `<div class="r16-row">
      <span class="r16-num">L${i+1}</span>
      <select class="r16-sel" data-round="r16" data-ti="${i}" data-side="t1" onchange="onR16Select(this)">
        <option value="">— Equipo 1 —</option>
        ${allQ.map(x=>`<option value="${x.team}"${tie.t1===x.team?' selected':''}>${x.team} (${x.pos===1?'1°':'2°'} ${x.group})</option>`).join('')}
      </select>
      <span class="r16-vs">vs</span>
      <select class="r16-sel" data-round="r16" data-ti="${i}" data-side="t2" onchange="onR16Select(this)">
        <option value="">— Equipo 2 —</option>
        ${allQ.map(x=>`<option value="${x.team}"${tie.t2===x.team?' selected':''}>${x.team} (${x.pos===1?'1°':'2°'} ${x.group})</option>`).join('')}
      </select>
    </div>`;
  }
  html += `</div></div>`;

  // Bracket
  html += `<div class="bracket-scroll"><div class="bracket">`;
  html += renderRound('r16', 'Octavos de Final', 8);
  html += renderRound('qf',  'Cuartos de Final', 4);
  html += renderRound('sf',  'Semifinales', 2);
  html += renderFinalRound();
  html += `<div class="bchamp">${renderChampion()}</div>`;
  html += `</div></div>`;

  sec.innerHTML = html;
}

function renderRound(roundKey, label, count) {
  const ties = data.knockout[roundKey];
  let html = `<div class="bround"><div class="bround-lbl">${label}</div><div class="bties">`;
  for (let i = 0; i < count; i++) {
    html += renderTie(roundKey, i, ties[i]);
  }
  html += `</div></div>`;
  return html;
}

function renderTie(rnd, i, tie) {
  const w = tieWinner(tie);
  const agg = tieAgg(tie);
  const pen = needsPen(tie);
  const isT1winner = w === tie.t1;
  const isT2winner = w === tie.t2;
  const t1cls = w ? (isT1winner ? ' winner' : ' loser') : '';
  const t2cls = w ? (isT2winner ? ' winner' : ' loser') : '';

  let html = `<div class="btie">
    <div class="btie-num">Llave ${i+1}${w ? ` &nbsp; <span style="color:var(--gold)">↑ ${w}</span>` : ''}</div>
    <div class="btie-leg">
      <span class="bteam${t1cls}">${tie.t1 || '<em style="color:var(--text3)">—</em>'}</span>
      <span class="leg-lbl">Ida</span>
      <div class="bscore">
        <input class="binput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-leg="l1" data-side="hg"
          value="${tie.l1.hg}" oninput="onKScore(this)">
        <span class="sdash" style="font-size:.65rem">-</span>
        <input class="binput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-leg="l1" data-side="ag"
          value="${tie.l1.ag}" oninput="onKScore(this)">
      </div>
      <span class="bteam${t2cls}" style="text-align:right">${tie.t2 || '<em style="color:var(--text3)">—</em>'}</span>
    </div>
    <div class="btie-leg">
      <span class="bteam${t2cls}">${tie.t2 || '<em style="color:var(--text3)">—</em>'}</span>
      <span class="leg-lbl">Vuelta</span>
      <div class="bscore">
        <input class="binput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-leg="l2" data-side="hg"
          value="${tie.l2.hg}" oninput="onKScore(this)">
        <span class="sdash" style="font-size:.65rem">-</span>
        <input class="binput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-leg="l2" data-side="ag"
          value="${tie.l2.ag}" oninput="onKScore(this)">
      </div>
      <span class="bteam${t1cls}" style="text-align:right">${tie.t1 || '<em style="color:var(--text3)">—</em>'}</span>
    </div>`;

  if (agg) {
    html += `<div class="btie-agg">
      <span class="agg-val" style="${isT1winner?'color:var(--gold)':''}">${tie.t1||'—'}: ${agg.a1}</span>
      <span class="agg-val" style="${isT2winner?'color:var(--gold)':''}">${tie.t2||'—'}: ${agg.a2}</span>
    </div>`;
  }
  if (pen) {
    html += `<div class="btie-pen">
      <span>Penales:</span>
      <input class="pinput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-side="p1"
        value="${tie.p1}" oninput="onKPen(this)" title="${tie.t1}">
      <span class="sdash" style="font-size:.65rem">-</span>
      <input class="pinput" type="number" min="0" data-rnd="${rnd}" data-ti="${i}" data-side="p2"
        value="${tie.p2}" oninput="onKPen(this)" title="${tie.t2}">
    </div>`;
  }
  html += `</div>`;
  return html;
}

function renderFinalRound() {
  const f = data.knockout.final;
  const w = finalWinner(f);
  const g1 = parseInt(f.hg), g2 = parseInt(f.ag);
  const hasResult = !isNaN(g1) && !isNaN(g2);
  const pen = hasResult && g1 === g2;
  const t1wins = w === f.t1, t2wins = w === f.t2;

  let html = `<div class="bround"><div class="bround-lbl">Final</div><div class="bties">
    <div class="btie">
      <div class="btie-num">Final Única</div>
      <div class="btie-leg">
        <span class="bteam${t1wins?' winner':t2wins?' loser':''}">${f.t1||'<em style="color:var(--text3)">—</em>'}</span>
        <span class="leg-lbl">Final</span>
        <div class="bscore">
          <input class="binput" type="number" min="0" data-rnd="final" data-side="hg"
            value="${f.hg}" oninput="onFinalScore(this)">
          <span class="sdash" style="font-size:.65rem">-</span>
          <input class="binput" type="number" min="0" data-rnd="final" data-side="ag"
            value="${f.ag}" oninput="onFinalScore(this)">
        </div>
        <span class="bteam${t2wins?' winner':t1wins?' loser':''}" style="text-align:right">${f.t2||'<em style="color:var(--text3)">—</em>'}</span>
      </div>`;
  if (pen) {
    html += `<div class="btie-pen">
      <span>Penales:</span>
      <input class="pinput" type="number" min="0" data-side="fp1" value="${f.p1}" oninput="onFinalPen(this)" title="${f.t1}">
      <span class="sdash" style="font-size:.65rem">-</span>
      <input class="pinput" type="number" min="0" data-side="fp2" value="${f.p2}" oninput="onFinalPen(this)" title="${f.t2}">
    </div>`;
  }
  html += `</div></div></div>`;
  return html;
}

function renderChampion() {
  const w = finalWinner(data.knockout.final);
  if (!w) return `<div class="trophy">🏆</div><div class="champ-lbl">Campeón</div><div class="champ-name" style="color:var(--text3)">Por definir</div>`;
  return `<div class="trophy">🏆</div><div class="champ-lbl">Campeón</div><div class="champ-name">${w}</div>`;
}

function propagateWinners() {
  // R16 → QF
  for (let i = 0; i < 8; i += 2) {
    const qi = i / 2;
    const w1 = tieWinner(data.knockout.r16[i]);
    const w2 = tieWinner(data.knockout.r16[i+1]);
    if (w1 && data.knockout.qf[qi].t1 !== w1) { data.knockout.qf[qi].t1 = w1; }
    if (w2 && data.knockout.qf[qi].t2 !== w2) { data.knockout.qf[qi].t2 = w2; }
  }
  // QF → SF
  for (let i = 0; i < 4; i += 2) {
    const si = i / 2;
    const w1 = tieWinner(data.knockout.qf[i]);
    const w2 = tieWinner(data.knockout.qf[i+1]);
    if (w1 && data.knockout.sf[si].t1 !== w1) { data.knockout.sf[si].t1 = w1; }
    if (w2 && data.knockout.sf[si].t2 !== w2) { data.knockout.sf[si].t2 = w2; }
  }
  // SF → Final
  const sw1 = tieWinner(data.knockout.sf[0]);
  const sw2 = tieWinner(data.knockout.sf[1]);
  if (sw1 && data.knockout.final.t1 !== sw1) { data.knockout.final.t1 = sw1; }
  if (sw2 && data.knockout.final.t2 !== sw2) { data.knockout.final.t2 = sw2; }
  saveData();
}

function onR16Select(sel) {
  const {ti, side} = sel.dataset;
  data.knockout.r16[parseInt(ti)][side] = sel.value;
  saveData();
  renderKnockout();
}

function onKScore(inp) {
  const {rnd, ti, leg, side} = inp.dataset;
  data.knockout[rnd][parseInt(ti)][leg][side] = inp.value;
  saveData();
  // Partial re-render of the bracket (re-render whole section is simplest)
  renderKnockout();
}

function onKPen(inp) {
  const {rnd, ti, side} = inp.dataset;
  data.knockout[rnd][parseInt(ti)][side] = inp.value;
  saveData();
  renderKnockout();
}

function onFinalScore(inp) {
  data.knockout.final[inp.dataset.side] = inp.value;
  saveData();
  renderKnockout();
}

function onFinalPen(inp) {
  const key = inp.dataset.side === 'fp1' ? 'p1' : 'p2';
  data.knockout.final[key] = inp.value;
  saveData();
  renderKnockout();
}

// ── SCORERS ─────────────────────────────────────────────────────────────────
function addScorer() {
  const name = document.getElementById('sc-name').value.trim();
  const teamEl = document.getElementById('sc-team'); const team = teamEl.tagName === 'SELECT' ? teamEl.value : teamEl.value.trim();
  const goals = parseInt(document.getElementById('sc-goals').value);
  if (!name || isNaN(goals) || goals < 0) return;
  data.scorers.push({name, team, goals});
  document.getElementById('sc-name').value = '';
  document.getElementById('sc-team').value = '';
  document.getElementById('sc-goals').value = '';
  saveData();
  renderScorers();
}

function updateScorerGoals(i, val) {
  data.scorers[i].goals = parseInt(val) || 0;
  saveData();
  renderScorers();
}

function deleteScorer(i) {
  data.scorers.splice(i, 1);
  saveData();
  renderScorers();
}

function renderScorers() {
  const sorted = [...data.scorers].map((s, i) => ({...s, orig: i}))
    .sort((a, b) => b.goals - a.goals || a.name.localeCompare(b.name));

  const medals = ['medal-1','medal-2','medal-3'];
  let html = `<div class="tbl-wrap"><table class="std-table">
    <thead><tr><th>#</th><th style="text-align:left">Jugador</th><th style="text-align:left">Equipo</th><th>Goles</th><th></th></tr></thead>
    <tbody>`;

  if (sorted.length === 0) {
    html += `<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">Sin goleadores registrados</td></tr>`;
  } else {
    sorted.forEach((s, rank) => {
      const medal = rank < 3 ? `<span class="${medals[rank]}">●</span> ` : '';
      html += `<tr>
        <td>${medal}${rank + 1}</td>
        <td style="text-align:left">${s.name}</td>
        <td style="text-align:left;color:var(--text2)">${s.team}</td>
        <td>
          <div class="goals-cell">
            <input class="goals-edit" type="number" min="0" value="${s.goals}"
              onchange="updateScorerGoals(${s.orig}, this.value)">
          </div>
        </td>
        <td><button class="btn-del" onclick="deleteScorer(${s.orig})">✕</button></td>
      </tr>`;
    });
  }
  html += '</tbody></table></div>';
  document.getElementById('scorers-body').innerHTML = html;
}

// ── INIT ────────────────────────────────────────────────────────────────────
initGroups();
renderScorers();
</script>
